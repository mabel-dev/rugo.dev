name: Release preflight

on:
  workflow_dispatch:
    inputs:
      arch:
        description: 'Target architecture to preflight (x86_64 or aarch64)'
        required: true
        default: 'aarch64'
      do_build:
        description: 'Run a short actual build for one ABI (cp39). Set to false to skip.'
        required: false
        default: 'true'
  push:

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (if needed)
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v2

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install cibuildwheel
        run: |
          python -m pip install --upgrade pip
          python -m pip install cibuildwheel==2.16.2

      - name: Print cibuildwheel help
        run: python -m cibuildwheel --help

      - name: Print build identifiers (dry-run)
        env:
          CIBW_PLATFORM: linux
          CIBW_ARCHS: ${{ github.event.inputs.arch }}
          CIBW_MANYLINUX_VERSION: manylinux2014
        run: python -m cibuildwheel --print-build-identifiers || true

      - name: Quick docker pull for manylinux images
        if: ${{ github.event.inputs.arch == 'aarch64' }}
        run: |
          # Try a few likely manylinux images that cibuildwheel may use
          docker pull quay.io/pypa/manylinux_2_28_aarch64:latest || true
          docker pull quay.io/pypa/manylinux_2_28_aarch64:2025.10.10-1 || true
          docker pull quay.io/pypa/manylinux2014_aarch64:latest || true

      - name: Quick single-ABI wheel build (cp39)
        if: ${{ github.event.inputs.do_build == 'true' }}
        env:
          CIBW_PLATFORM: linux
          CIBW_ARCHS: ${{ github.event.inputs.arch }}
          CIBW_MANYLINUX_VERSION: manylinux2014
          # Only build CPython 3.9 wheels to keep build short
          CIBW_BUILD: cp39-*
        run: |
          echo "Starting quick build for CPython 3.9 on arch=${{ github.event.inputs.arch }}"
          python -m cibuildwheel --output-dir wheelhouse

      - name: Upload preflight wheel artifact
        if: ${{ github.event.inputs.do_build == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: preflight-wheels
          path: wheelhouse

      - name: Show Docker info
        run: docker version && docker info || true

      - name: Echo success note
        run: echo "Preflight checks finished — inspect logs for any pull/identifier errors."
