name: Build and Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_to_test:
        description: 'Publish to Test PyPI'
        required: false
        default: false
        type: boolean

jobs:
  build_wheels:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install cibuildwheel==2.16.2

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "pp* *-manylinux_i686"
          CIBW_BEFORE_BUILD: "pip install -U pip setuptools wheel Cython"
          CIBW_TEST_COMMAND: "python -c \"import rugo.parquet; print('Import successful')\""
          CIBW_TEST_SKIP: "cp310-* *-*linux_{ppc64le,s390x}"
          CIBW_ARCHS_LINUX: "x86_64"
          CIBW_ARCHS_MACOS: "auto"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  # Build manylinux aarch64 (Linux ARM) wheels separately so they are available
  # as part of the release artifacts. cibuildwheel will use the manylinux aarch64
  # docker images to create wheels for aarch64.
  build_wheels_aarch64:
    runs-on: ubuntu-24.04-arm
    needs: []
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install cibuildwheel
        run: python -m pip install --upgrade pip wheel build cibuildwheel

      - name: Build manylinux aarch64 wheels
        env:
          CIBW_PLATFORM: "linux"
          CIBW_ARCHS: "aarch64"
          # Pin to a stable manylinux version to avoid date-stamped image tags
          CIBW_MANYLINUX_VERSION: "manylinux2014"
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-*"
          CIBW_SKIP: "pp* *-manylinux_i686"
          CIBW_BEFORE_BUILD: "pip install -U pip setuptools wheel Cython"
          CIBW_TEST_COMMAND: "python -c \"import rugo.parquet; print('Import successful')\""
          CIBW_TEST_SKIP: "cp310-*"
        run: |
          # Print build identifiers (dry-run) to validate configuration quickly
          python -m cibuildwheel --print-build-identifiers || (echo "Invalid cibuildwheel config" && exit 1)
          # Run the full build (may take long)
          python -m cibuildwheel --output-dir wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-aarch64
          path: wheelhouse/*.whl

  build_sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install build setuptools wheel Cython
      - run: python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    needs: [build_wheels, build_sdist, build_wheels_aarch64]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with: {name: wheels-ubuntu-latest, path: dist}
      - uses: actions/download-artifact@v4
        with: {name: wheels-macos-latest, path: dist}
      - uses: actions/download-artifact@v4
        with: {name: wheels-aarch64, path: dist}
      - uses: actions/download-artifact@v4
        with: {name: sdist, path: dist}
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish_test:
    needs: [build_wheels, build_sdist, build_wheels_aarch64]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.publish_to_test
    environment: test-pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with: {name: wheels-ubuntu-latest, path: dist}
      - uses: actions/download-artifact@v4
        with: {name: wheels-macos-latest, path: dist}
      - uses: actions/download-artifact@v4
        with: {name: wheels-aarch64, path: dist}
      - uses: actions/download-artifact@v4
        with: {name: sdist, path: dist}
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
